{% load i18n %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% trans "إنشاء حساب جديد" %}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1c1e21; text-align: center; margin-bottom: 25px; }
        form p { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .footer-link { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2>{% trans "إنشاء حساب جديد" %}</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mb-3">
    <label style="color: #38bdf8;">أنا أريد التسجيل كـ:</label>
    <select id="userType" name="user_type" class="form-select" onchange="toggleDriverFields()" style="background: #1e293b; color: white; border: 1px solid #38bdf8;">
        <option value="customer">عميل (أبحث عن خدمة)</option>
        <option value="driver">سائق (مقدم خدمة)</option>
    </select>
</div>

<div id="driverExtraFields" style="display: none; background: rgba(56, 189, 248, 0.05); padding: 15px; border-radius: 10px; border: 1px dashed #38bdf8; margin-bottom: 20px;">
    <h6 style="color: #38bdf8; margin-bottom: 15px;">إثبات الشخصية (مطلوب للسائقين فقط)</h6>
    
    <div class="mb-3">
        <label>صورة الهوية - الوجه الأمامي</label>
        <input type="file" name="id_front" class="form-control">
    </div>
    
    <div class="mb-3">
        <label>صورة الهوية - الوجه الخلفي</label>
        <input type="file" name="id_back" class="form-control">
    </div>
</div>
            <button type="submit">{% trans "سجل الآن" %}</button>
        </form>
        <div class="footer-link">
            <a href="{% url 'login' %}">{% trans "لديك حساب بالفعل؟ سجل دخولك" %}</a>
        </div>
    </div>
<script>
function toggleDriverFields() {
    // الحصول على القيمة المختارة
    var selection = document.getElementById("userType").value;
    // الحصول على حاوية الخانات الإضافية
    var extraFields = document.getElementById("driverExtraFields");

    if (selection === "driver") {
        extraFields.style.display = "block"; // أظهرها إذا اختار سائق
    } else {
        extraFields.style.display = "none";  // أخفها إذا اختار عميل
    }
}
</script>
    
</body>
</html>
