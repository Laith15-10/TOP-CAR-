<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; padding: 20px; }
        
        .order-container {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            margin-top: 20px;
        }

        h3 { color: #38bdf8; font-weight: bold; margin-bottom: 25px; text-align: center; }

        label { margin-bottom: 8px; font-size: 14px; color: #94a3b8; }

        .form-control {
            background: #0f172a !important;
            border: 1px solid #334155 !important;
            color: white !important;
            border-radius: 12px !important;
            padding: 12px !important;
            margin-bottom: 20px !important;
        }

        .form-control:focus {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .btn-confirm {
            background: linear-gradient(90deg, #0ea5e9, #2dd4bf);
            border: none;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            color: white;
            margin-top: 10px;
        }
      
    </style>
</head>
<body>

<div class="container">
    <h3>طلب خدمة جديدة 🚗</h3>
    
    <div class="order-container">
     
     <form method="POST" action="/create-order/">
    {% csrf_token %}       
            <label>اسمك الكريم:</label>
            <input type="text" name="customer_name" class="form-control" placeholder="أدخل اسمك">

            <label>نوع السيارة وموديلها:</label>
            <input type="text" name="car_model" class="form-control" placeholder="مثلاً: تويوتا كامري 2023">

            <label>رقم الموبايل:</label>
            <input type="tel" name="phone" class="form-control" placeholder="07XXXXXXXX">

           <label>اختر منطقتك في عمان:</label>
<select name="location" class="form-control">
    <option value="" disabled selected>-- اختر المنطقة --</option>
    <option>عبدون</option>
    <option>دير غبار</option>
    <option>الصويفية</option>
    <option>خلدا</option>
    <option>تلاع العلي</option>
    <option>الرابية</option>
    <option>أم أذينة</option>
    <option>الشميساني</option>
    <option>الجاردنز</option>
    <option>شارع مكة</option>
    <option>شارع المدينة المنورة</option>
    <option>الكرسي</option>
    <option>دابوق</option>
    <option>بدر الجديدة</option>
    <option>الجبيهة</option>
    <option>أبو نصير</option>
    <option>شفا بدران</option>
    <option>ضاحية الرشيد</option>
    <option>طبربور</option>
    <option>عين باشا</option>
    <option>ضاحية الأمير راشد</option>
    <option>وسط البلد</option>
    <option>جبل عمان</option>
    <option>جبل اللويبدة</option>
    <option>جبل الحسين</option>
    <option>المصدار</option>
    <option>المحطة</option>
    <option>القلعة</option>
    <option>ماركا الشمالية</option>
    <option>ماركا الجنوبية</option>
    <option>النزهة</option>
    <option>الهاشمي الشمالي</option>
    <option>الهاشمي الجنوبي</option>
    <option>القويسمة</option>
    <option>أبو علندا</option>
    <option>جبل النصر</option>
    <option>جبل الزهور</option>
    <option>حي نزال</option>
    <option>الياسمين</option>
    <option>سحاب</option>
    <option>المقابلين</option>
    <option>خريبة السوق</option>
    <option>بيادر وادي السير</option>
    <option>مرج الحمام</option>
    <option>ناعور</option>
    <option>بنيات</option>
    <option>الجويدة</option>
    <option>طريق المطار</option>
    <option>أم نوارة</option>
    <option>المنارة</option>
    <option>ضاحية الاستقلال</option>
    <option>حي السهل</option>
    <option>أم القرى</option>
    <option>وادي الحدادة</option>
    <option>رغدان</option>
</select>

            <button type="submit" class="btn-confirm">تأكيد الحجز الآن</button>
        </form>
    </div>
</div>

</body>
</html>
